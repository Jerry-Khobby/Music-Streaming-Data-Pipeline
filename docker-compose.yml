services:

  # ── Run the full test suite ─────────────────────────────────────────────────
  test:
    build:
      context: .
      dockerfile: Dockerfile
    volumes:
      # Live-mount source so edits are picked up without a rebuild
      - ./glue_jobs:/app/glue_jobs
      - ./tests:/app/tests
      - ./stubs:/app/stubs
    environment:
      - PYTHONPATH=/app:/app/stubs
      - SPARK_LOCAL_IP=127.0.0.1
      - PYSPARK_PYTHON=python3
      # Fake AWS credentials — moto intercepts all boto3 calls before they hit AWS
      - AWS_DEFAULT_REGION=us-east-1
      - AWS_ACCESS_KEY_ID=test
      - AWS_SECRET_ACCESS_KEY=test
    command: >
      python3 -m pytest tests/ -v --tb=short
      --cov=glue_jobs --cov-report=term-missing

  # ── Run tests with HTML coverage report written to ./coverage-report/ ───────
  test-coverage:
    build:
      context: .
      dockerfile: Dockerfile
    volumes:
      - ./glue_jobs:/app/glue_jobs
      - ./tests:/app/tests
      - ./stubs:/app/stubs
      - ./coverage-report:/app/coverage-report
    environment:
      - PYTHONPATH=/app:/app/stubs
      - SPARK_LOCAL_IP=127.0.0.1
      - PYSPARK_PYTHON=python3
      - AWS_DEFAULT_REGION=us-east-1
      - AWS_ACCESS_KEY_ID=test
      - AWS_SECRET_ACCESS_KEY=test
    command: >
      python3 -m pytest tests/ -v --tb=short
      --cov=glue_jobs --cov-report=html:coverage-report --cov-report=term-missing

  # ── Run a single test file ──────────────────────────────────────────────────
  # Usage: docker compose run --rm test-single tests/test_etl_transform_job.py
  test-single:
    build:
      context: .
      dockerfile: Dockerfile
    volumes:
      - ./glue_jobs:/app/glue_jobs
      - ./tests:/app/tests
      - ./stubs:/app/stubs
    environment:
      - PYTHONPATH=/app:/app/stubs
      - SPARK_LOCAL_IP=127.0.0.1
      - PYSPARK_PYTHON=python3
      - AWS_DEFAULT_REGION=us-east-1
      - AWS_ACCESS_KEY_ID=test
      - AWS_SECRET_ACCESS_KEY=test
    entrypoint: ["python3", "-m", "pytest", "-v", "--tb=long"]
